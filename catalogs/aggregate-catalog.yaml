# Каталог агрегатов КДО
# Phase 5 (SQL Layer) — T021
# Автоматически заполнен на основе 3 универсальных процедур:
#   spKDO_Aggregate  — факт-таблица tbRecords
#   spKDO_ClientList — fnKDO_ClientStatus + tbClients
#   spKDO_CommAgg    — tbClientCommunicationHistory
# Последнее обновление: 2026-04-19

aggregates:

  # ══════════════════════════════════════════════════════
  # spKDO_Aggregate — группировки по записям (tbRecords)
  # ══════════════════════════════════════════════════════

  - id: revenue_total
    name: "Общая выручка"
    data_method: revenue_total
    metric_type: monetary
    description: "Суммарная выручка по салону за период. Единственная строка KPI: визиты, уникальные клиенты, средний чек, возвращаемость."
    dimensions: []
    example_questions:
      - "покажи общую выручку за месяц"
      - "сколько выручили за апрель"
    unit: RUB
    aggregation: SUM
    category: revenue
    procedure: spKDO_Aggregate
    allowed_group_by: [total]
    parameters:
      - name: date_from
        type: date
        required: true
      - name: date_to
        type: date
        required: true
      - name: object_id
        type: int
        required: true
      - name: master_id
        type: int
        required: false
      - name: top
        type: int
        required: false
        default: 20
    returns: [Visits, UniqueClients, ActiveMasters, Revenue, AvgCheck, TotalHours, ReturningClients, SalonName]
    examples:
      - question: "покажи общую выручку за месяц"
      - question: "сколько выручили за апрель"
      - question: "общая статистика по салону"

  - id: revenue_by_week
    name: "Выручка по неделям"
    data_method: revenue_by_week
    metric_type: monetary
    description: "Динамика выручки с разбивкой по неделям. Каждая строка — одна неделя (EndOfWeek)."
    dimensions: [date]
    example_questions:
      - "выручка по неделям за последние 2 месяца"
      - "недельный тренд выручки"
    unit: RUB
    aggregation: SUM
    category: revenue
    procedure: spKDO_Aggregate
    allowed_group_by: [week]
    parameters:
      - name: date_from
        type: date
        required: true
      - name: date_to
        type: date
        required: true
      - name: object_id
        type: int
        required: true
      - name: master_id
        type: int
        required: false
      - name: top
        type: int
        required: false
        default: 20
    returns: [Period, Visits, UniqueClients, Revenue, AvgCheck, ActiveMasters]
    examples:
      - question: "выручка по неделям за последние 2 месяца"
      - question: "недельный тренд"
      - question: "динамика по неделям"

  - id: revenue_by_month
    name: "Выручка по месяцам"
    data_method: revenue_by_month
    metric_type: monetary
    description: "Динамика выручки с разбивкой по месяцам. Каждая строка — один месяц (EndOfMonth)."
    dimensions: [date]
    example_questions:
      - "выручка по месяцам за год"
      - "помесячная динамика выручки"
    unit: RUB
    aggregation: SUM
    category: revenue
    procedure: spKDO_Aggregate
    allowed_group_by: [month]
    parameters:
      - name: date_from
        type: date
        required: true
      - name: date_to
        type: date
        required: true
      - name: object_id
        type: int
        required: true
      - name: master_id
        type: int
        required: false
      - name: top
        type: int
        required: false
        default: 20
    returns: [Period, Visits, UniqueClients, Revenue, AvgCheck, ActiveMasters]
    examples:
      - question: "выручка по месяцам за год"
      - question: "помесячная динамика"
      - question: "тренд по месяцам"

  - id: revenue_by_master
    name: "Выручка по мастерам"
    data_method: revenue_by_master
    metric_type: monetary
    description: "Выручка, количество визитов и средний чек в разрезе мастеров. Включает выручку в час и общие часы работы."
    dimensions: [date, master_id]
    example_questions:
      - "какой мастер принёс больше всех в марте"
      - "топ мастеров по выручке за квартал"
    unit: RUB
    aggregation: SUM
    category: masters
    procedure: spKDO_Aggregate
    allowed_group_by: [master]
    parameters:
      - name: date_from
        type: date
        required: true
      - name: date_to
        type: date
        required: true
      - name: object_id
        type: int
        required: true
      - name: master_id
        type: int
        required: false
      - name: top
        type: int
        required: false
        default: 20
    returns: [MasterName, Rating, Visits, UniqueClients, Revenue, AvgCheck, TotalHours, RevenuePerHour, SalonName]
    examples:
      - question: "топ мастеров по выручке"
      - question: "производительность мастеров за месяц"
      - question: "кто из мастеров заработал больше всего"

  - id: revenue_by_service
    name: "Выручка по услугам"
    data_method: revenue_by_service
    metric_type: monetary
    description: "Выручка и количество оказанных услуг по каждой услуге (ServiceId + tbServicesSettings)."
    dimensions: [date, service]
    example_questions:
      - "топ услуг по выручке за квартал"
      - "какие услуги пользуются наибольшим спросом"
    unit: RUB
    aggregation: SUM
    category: services
    procedure: spKDO_Aggregate
    allowed_group_by: [service]
    parameters:
      - name: date_from
        type: date
        required: true
      - name: date_to
        type: date
        required: true
      - name: object_id
        type: int
        required: true
      - name: master_id
        type: int
        required: false
      - name: top
        type: int
        required: false
        default: 20
    returns: [ServiceName, ServiceCategory, ServiceCount, UniqueClients, Revenue, AvgCheck, SalonName]
    examples:
      - question: "топ услуг по выручке"
      - question: "какие услуги пользуются спросом"
      - question: "выручка по услугам за квартал"

  - id: revenue_by_salon
    name: "Выручка по салонам"
    data_method: revenue_by_salon
    metric_type: monetary
    description: "Сравнительная выручка по всем салонам сети за период. Не требует object_id — охватывает все салоны."
    dimensions: [date, salon]
    example_questions:
      - "сравни выручку по всем салонам за месяц"
      - "рейтинг филиалов по выручке"
    unit: RUB
    aggregation: SUM
    category: revenue
    procedure: spKDO_Aggregate
    allowed_group_by: [salon]
    parameters:
      - name: date_from
        type: date
        required: true
      - name: date_to
        type: date
        required: true
      - name: object_id
        type: int
        required: false
        description: "Если не указан — показывает все салоны (период ограничен 90 днями)"
      - name: master_id
        type: int
        required: false
      - name: top
        type: int
        required: false
        default: 20
    returns: [SalonName, Visits, UniqueClients, ActiveMasters, Revenue, AvgCheck]
    examples:
      - question: "сравни салоны по выручке"
      - question: "рейтинг филиалов"
      - question: "выручка по всем салонам"

  - id: revenue_by_channel
    name: "Выручка по каналам привлечения"
    data_method: revenue_by_channel
    metric_type: monetary
    description: "Распределение клиентов и выручки по каналам привлечения (AcquisitionChannel из tbClients)."
    dimensions: [date, channel]
    example_questions:
      - "откуда приходят клиенты и сколько они приносят"
      - "эффективность каналов маркетинга по выручке"
    unit: RUB
    aggregation: SUM
    category: marketing
    procedure: spKDO_Aggregate
    allowed_group_by: [channel]
    parameters:
      - name: date_from
        type: date
        required: true
      - name: date_to
        type: date
        required: true
      - name: object_id
        type: int
        required: true
      - name: top
        type: int
        required: false
        default: 20
    returns: [Channel, ClientCount, Visits, Revenue, AvgCheck, SalonName]
    examples:
      - question: "откуда приходят клиенты"
      - question: "каналы привлечения"
      - question: "эффективность каналов маркетинга"

  # ══════════════════════════════════════════════════════
  # spKDO_ClientList — списки клиентов по статусу КДО
  # ══════════════════════════════════════════════════════

  - id: clients_outflow
    name: "Отток клиентов"
    data_method: clients_outflow
    metric_type: count
    description: "Клиенты без визита 31-240 дней сверх ожидаемой даты (DaysToAwaiting от -240 до -31). Соответствует DAX-мере «Статус клиента для обработки = Отток»."
    dimensions: [date, master_id]
    example_questions:
      - "покажи список клиентов в оттоке"
      - "кто из клиентов ушёл в отток и требует обзвона"
    unit: null
    aggregation: COUNT
    category: clients
    procedure: spKDO_ClientList
    allowed_group_by: [list, status, master]
    parameters:
      - name: date_from
        type: date
        required: false
      - name: date_to
        type: date
        required: false
      - name: object_id
        type: int
        required: true
      - name: master_id
        type: int
        required: false
      - name: filter
        type: string
        required: false
        allowed_values: [all, birthday, forecast, leaving, noshow, outflow, quality]
        default: outflow
      - name: group_by
        type: string
        required: false
        default: list
      - name: top
        type: int
        required: false
        default: 20
    returns: [ClientName, Phone, Category, ClientStatus, LastVisit, FirstVisit, ExpectedNextVisit, DaysSinceLastVisit, DaysOverdue, ServicePeriodDays, TotalVisits, TotalSpent, LastCommResult, SalonName]
    examples:
      - question: "покажи отток клиентов"
      - question: "кто из клиентов уходит в отток"
      - question: "список оттока"

  - id: clients_leaving
    name: "Уходящие клиенты"
    data_method: clients_leaving
    metric_type: count
    description: "Клиенты без визита 1-30 дней сверх ожидаемой даты (DaysToAwaiting от -30 до -1). Соответствует DAX-мере «Уходящие»."
    dimensions: [date, master_id]
    example_questions:
      - "кто из клиентов скоро уйдёт и требует звонка"
      - "список уходящих клиентов на этой неделе"
    unit: null
    aggregation: COUNT
    category: clients
    procedure: spKDO_ClientList
    allowed_group_by: [list, status, master]
    parameters:
      - name: date_from
        type: date
        required: false
      - name: date_to
        type: date
        required: false
      - name: object_id
        type: int
        required: true
      - name: master_id
        type: int
        required: false
      - name: filter
        type: string
        required: false
        allowed_values: [all, birthday, forecast, leaving, noshow, outflow, quality]
        default: leaving
      - name: group_by
        type: string
        required: false
        default: list
      - name: top
        type: int
        required: false
        default: 20
    returns: [ClientName, Phone, Category, ClientStatus, LastVisit, ExpectedNextVisit, DaysSinceLastVisit, DaysOverdue, ServicePeriodDays, TotalVisits, TotalSpent, LastCommResult, SalonName]
    examples:
      - question: "уходящие клиенты"
      - question: "кто скоро уйдёт"
      - question: "список уходящих"

  - id: clients_forecast
    name: "Прогноз визитов"
    data_method: clients_forecast
    metric_type: count
    description: "Клиенты с ожидаемой датой следующего визита через 0-14 дней. Соответствует DAX-мере «Прогноз визитов»."
    dimensions: [date, master_id]
    example_questions:
      - "кто ожидается на визит в ближайшие две недели"
      - "сколько клиентов придёт на этой неделе по прогнозу"
    unit: null
    aggregation: COUNT
    category: clients
    procedure: spKDO_ClientList
    allowed_group_by: [list, status, master]
    parameters:
      - name: date_from
        type: date
        required: false
      - name: date_to
        type: date
        required: false
      - name: object_id
        type: int
        required: true
      - name: master_id
        type: int
        required: false
      - name: filter
        type: string
        required: false
        allowed_values: [all, birthday, forecast, leaving, noshow, outflow, quality]
        default: forecast
      - name: group_by
        type: string
        required: false
        default: list
      - name: top
        type: int
        required: false
        default: 20
    returns: [ClientName, Phone, Category, ClientStatus, LastVisit, ExpectedNextVisit, DaysUntilExpected, ServicePeriodDays, TotalVisits, TotalSpent, LastCommResult, SalonName]
    examples:
      - question: "кто ожидается на визит в ближайшие две недели"
      - question: "прогноз визитов"
      - question: "кому скоро пора к нам"

  - id: clients_noshow
    name: "Недошедшие клиенты"
    data_method: clients_noshow
    metric_type: count
    description: "Клиенты с отменёнными записями без последующего выполненного визита (первичный или повторный)."
    dimensions: [date, master_id]
    example_questions:
      - "кто записывался но не пришёл на визит"
      - "список недошедших клиентов за неделю"
    unit: null
    aggregation: COUNT
    category: clients
    procedure: spKDO_ClientList
    allowed_group_by: [list, status, master]
    parameters:
      - name: date_from
        type: date
        required: false
      - name: date_to
        type: date
        required: false
      - name: object_id
        type: int
        required: true
      - name: master_id
        type: int
        required: false
      - name: filter
        type: string
        required: false
        allowed_values: [all, birthday, forecast, leaving, noshow, outflow, quality]
        default: noshow
      - name: group_by
        type: string
        required: false
        default: list
      - name: top
        type: int
        required: false
        default: 20
    returns: [ClientName, Phone, Category, ClientStatus, LastCancelledVisit, LastSuccessVisit, FirstVisit, LastCommResult, LastCommDate, SalonName]
    examples:
      - question: "недошедшие клиенты"
      - question: "кто записывался но не пришёл"
      - question: "список недошедших"

  - id: clients_quality
    name: "Контроль качества"
    data_method: clients_quality
    metric_type: count
    description: "Клиенты с визитом не более 7 дней назад — первичные и повторные. Требуют обзвона для контроля качества."
    dimensions: [date, master_id]
    example_questions:
      - "кому нужно позвонить для контроля качества после визита"
      - "список клиентов для обзвона по качеству за сегодня"
    unit: null
    aggregation: COUNT
    category: clients
    procedure: spKDO_ClientList
    allowed_group_by: [list, status, master]
    parameters:
      - name: date_from
        type: date
        required: false
      - name: date_to
        type: date
        required: false
      - name: object_id
        type: int
        required: true
      - name: master_id
        type: int
        required: false
      - name: filter
        type: string
        required: false
        allowed_values: [all, birthday, forecast, leaving, noshow, outflow, quality]
        default: quality
      - name: group_by
        type: string
        required: false
        default: list
      - name: top
        type: int
        required: false
        default: 20
    returns: [ClientName, Phone, Category, ClientStatus, LastVisit, FirstVisit, ExpectedNextVisit, TotalVisits, TotalSpent, LastCommResult, SalonName]
    examples:
      - question: "кому нужен контроль качества"
      - question: "свежие визиты для обзвона"
      - question: "список контроля качества"

  - id: clients_birthday
    name: "Именинники"
    data_method: clients_birthday
    metric_type: count
    description: "Клиенты с днём рождения в заданный диапазон дат. По умолчанию — ближайшие 7 дней. Показывает был ли уже поздравлен."
    dimensions: [date]
    example_questions:
      - "кто из клиентов отмечает день рождения на этой неделе"
      - "список именинников на ближайшие 7 дней"
    unit: null
    aggregation: COUNT
    category: clients
    procedure: spKDO_ClientList
    allowed_group_by: [list]
    parameters:
      - name: date_from
        type: date
        required: false
        default: "today"
        description: "Начало диапазона дат рождения (по умолчанию сегодня)"
      - name: date_to
        type: date
        required: false
        default: "today+7d"
        description: "Конец диапазона дат рождения (по умолчанию +7 дней)"
      - name: object_id
        type: int
        required: true
      - name: filter
        type: string
        required: false
        allowed_values: [all, birthday, forecast, leaving, noshow, outflow, quality]
        default: birthday
      - name: top
        type: int
        required: false
        default: 20
    returns: [ClientName, Phone, BirthDate, Age, Category, SalonName, Congratulated]
    examples:
      - question: "именинники на этой неделе"
      - question: "кто отмечает день рождения"
      - question: "список именинников"

  - id: clients_all
    name: "Все клиенты"
    data_method: clients_all
    metric_type: count
    description: "Полная клиентская база с историей визитов и текущим статусом КДО."
    dimensions: [date, master_id]
    example_questions:
      - "покажи всю клиентскую базу с распределением по статусам"
      - "сколько всего клиентов в базе и какое у них распределение"
    unit: null
    aggregation: COUNT
    category: clients
    procedure: spKDO_ClientList
    allowed_group_by: [list, status, master]
    parameters:
      - name: date_from
        type: date
        required: false
      - name: date_to
        type: date
        required: false
      - name: object_id
        type: int
        required: true
      - name: master_id
        type: int
        required: false
      - name: filter
        type: string
        required: false
        allowed_values: [all, birthday, forecast, leaving, noshow, outflow, quality]
        default: all
      - name: group_by
        type: string
        required: false
        default: list
      - name: top
        type: int
        required: false
        default: 20
    returns: [ClientName, Phone, Category, ClientStatus, LastVisit, FirstVisit, ExpectedNextVisit, DaysSinceLastVisit, DaysOverdue, ServicePeriodDays, TotalVisits, TotalSpent, LastCommResult, SalonName]
    examples:
      - question: "все клиенты"
      - question: "клиентская база"
      - question: "распределение клиентов по статусам"

  # ══════════════════════════════════════════════════════
  # spKDO_CommAgg — агрегация коммуникаций
  # Reason × GroupBy комбинации
  # ══════════════════════════════════════════════════════

  - id: comm_all_by_reason
    name: "Коммуникации по причинам"
    data_method: comm_all_by_reason
    metric_type: count
    description: "Сводка всех коммуникаций с группировкой по причине обращения. Показывает конверсию (записался / отказался)."
    dimensions: [date, reason]
    example_questions:
      - "коммуникации за месяц с разбивкой по типам обращения"
      - "сводная статистика обзвонов по причинам за период"
    unit: null
    aggregation: COUNT
    category: communications
    procedure: spKDO_CommAgg
    allowed_group_by: [reason]
    parameters:
      - name: date_from
        type: date
        required: true
      - name: date_to
        type: date
        required: true
      - name: object_id
        type: int
        required: true
      - name: reason
        type: string
        required: false
        allowed_values: [all, birthday, forecast, leaving, noshow, opz, outflow, quality, waitlist]
        default: all
      - name: group_by
        type: string
        required: false
        default: reason
      - name: top
        type: int
        required: false
        default: 20
    returns: [Reason, TotalCount, UniqueClients, BookedCount, RefusedCount, SalonName]
    examples:
      - question: "коммуникации за месяц по типам"
      - question: "сводка обзвонов"
      - question: "статистика коммуникаций"

  - id: comm_all_by_result
    name: "Коммуникации по результатам"
    data_method: comm_all_by_result
    metric_type: count
    description: "Распределение всех коммуникаций по результату (Записался, Отказался, Пообещал и т.д.)."
    dimensions: [date, result]
    example_questions:
      - "сколько клиентов записалось после обзвона в этом месяце"
      - "конверсия коммуникаций по результатам за период"
    unit: null
    aggregation: COUNT
    category: communications
    procedure: spKDO_CommAgg
    allowed_group_by: [result]
    parameters:
      - name: date_from
        type: date
        required: true
      - name: date_to
        type: date
        required: true
      - name: object_id
        type: int
        required: true
      - name: reason
        type: string
        required: false
        allowed_values: [all, birthday, forecast, leaving, noshow, opz, outflow, quality, waitlist]
        default: all
      - name: group_by
        type: string
        required: false
        default: result
      - name: top
        type: int
        required: false
        default: 20
    returns: [Result, TotalCount, UniqueClients, SalonName]
    examples:
      - question: "результаты коммуникаций"
      - question: "сколько записалось после обзвона"
      - question: "конверсия коммуникаций"

  - id: comm_all_by_manager
    name: "Коммуникации по менеджерам"
    data_method: comm_all_by_manager
    metric_type: count
    description: "Производительность менеджеров по количеству коммуникаций и конверсии в запись."
    dimensions: [date, manager]
    example_questions:
