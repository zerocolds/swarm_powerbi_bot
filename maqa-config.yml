# MAQA — Multi-Agent & Quality Assurance
# Generated by: speckit.maqa.setup
# Docs: https://github.com/spec-kit-maqa/spec-kit-maqa

# ── Test runner ───────────────────────────────────────────────────────────────
test_command: "pytest -q"
test_file_command: "pytest {file}"

# ── TDD mode ──────────────────────────────────────────────────────────────────
# When true: write test first → implement → confirm green.
tdd: false

# ── Board integration ─────────────────────────────────────────────────────────
board: "local"

# ── Parallelism ───────────────────────────────────────────────────────────────
max_parallel: 3

# ── Worktrees ─────────────────────────────────────────────────────────────────
worktree_base: ".."

# ── QA checks ─────────────────────────────────────────────────────────────────
qa:
  text: true
  links: true
  security: true
  accessibility: false
  responsive: false
  empty_states: false
